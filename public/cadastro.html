<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-lg-11">
            <div class="card p-5 shadow-lg border-color: gray  rounded-4">

                <h2 class="text-center mb-4">Cadastro</h2>

                <form>
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label for="email" class="form-label">Email</label>
                            <input id= "email" type="email" class="form-control input-preto" placeholder="Digite seu email"
                                style= "border: 2px solid #000;"><br><br>

                            <label class="form-label" for="senha">Senha</label>
                            <input type="password" class="form-control input-preto" placeholder="Digite sua senha"
                                style= "border: 2px solid #000;" id="senha"><br><br>

                            <label class="form-label" for="confirm_senha">Confirmar senha</label>
                            <input type="password" class="form-control input-preto" placeholder="Confirme sua senha"
                                style= "border: 2px solid #000;" id="confirm_senha"><br><br>

                            <label class="form-label" for="EstadoCivil">Estado Cívil</label><br>
                            <select id="EstadoCivil" class="form-control" style= "border: 2px solid #000;">
                                <option value="">Selecione</option>
                                <option value="solteiro">Solteiro</option>
                                <option value="casado">Casado</option>
                                <option value="divorciado">Divorciado</option>
                                <option value="separado">Separado</option>
                                <option value="viuvo">Viúvo</option>
                            </select><br><br>
                        </div>


                        <div class="col-md-4">
                            <label class="form-label" for="nome">Nome Completo</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite seu nome completo"
                                style= "border: 2px solid #000;" id="nome"><br><br>

                            <label class="form-label" for="cpf">CPF</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite seu CPF"
                                style= "border: 2px solid #000;" id="cpf"><br><br>

                            <label class="form-label" for="data">Data de Nascimento</label>
                            <input type="text" class="form-control input-preto"
                                placeholder="Digite sua data de nascimento" style= "border: 2px solid #000;" id="data"><br><br>

                            <label class="form-label" for="cep">CEP</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite seu CEP"
                                style= "border: 2px solid #000;" id="cep"><br><br>
                        </div>


                        <div class="col-md-4">
                            <label class="form-label" for="rua">Rua</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite a rua"
                                style= "border: 2px solid #000;" id="rua"><br><br>

                            <label class="form-label" for="comp">Complemento</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite um complemento"
                                style= "border: 2px solid #000;" id="comp"><br><br>

                            <label class="form-label" for="cidade">Cidade</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite a cidade"
                                style= "border: 2px solid #000;" id="cidade"><br><br>

                            <label class="form-label" for="ramal">Ramal</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite seu ramal"
                                style= "border: 2px solid #000;" id="ramal"><br><br>
                        </div>
                    </div>
                    <div class=" d-flex justify-content-center">
                        <button class="btn btn-primary px-5" style="border-color: black;">Cadastrar</button>
                    </div>
                    <div class=" d-flex justify-content-center">

                        <small style="font-size: 15px; text-align: center;">
                            Já tem conta? <a href="login.html">Entrar</a>
                        </small><br>
                        </div>
                    <p id="resultado"></p>       
                </form>
            </div>
        </div>
</body>

</html>
