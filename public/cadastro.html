<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-lg-11">
            <div class="card p-5 shadow border-0 rounded-4">

                <h2 class="text-center mb-4">Cadastro</h2>

                <form>
                    <div class="row g-4">
                        <div class="col-md-4">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control input-preto" placeholder="Digite seu email"
                                style="border-color: black;"><br><br>

                            <label class="form-label">Senha</label>
                            <input type="password" class="form-control input-preto" placeholder="Digite sua senha"
                                style="border-color: black;"><br><br>

                            <label class="form-label">Confirmar senha</label>
                            <input type="password" class="form-control input-preto" placeholder="Confirme sua senha"
                                style="border-color: black;"><br><br>

                            <label class="form-label">Estado </label><br>
                            <select id="EstadoCivil" class="form-control" style="border-color: black;">
                                <option value="">Selecione</option>
                                <option value="solteiro">Solteiro</option>
                                <option value="casado">Casado</option>
                                <option value="divorciado">Divorciado</option>
                                <option value="separado">Separado</option>
                                <option value="viuvo">Viúvo</option>
                            </select><br><br>
                        </div>


                        <div class="col-md-4">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite seu nome completo"
                                style="border-color: black;"><br><br>

                            <label class="form-label">CPF</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite seu CPF"
                                style="border-color: black;"><br><br>

                            <label class="form-label">Data de Nascimento</label>
                            <input type="text" class="form-control input-preto"
                                placeholder="Digite sua data de nascimento" style="border-color: black;"><br><br>

                            <label class="form-label">CEP</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite seu CEP"
                                style="border-color: black;"><br><br>
                        </div>


                        <div class="col-md-4">
                            <label class="form-label">Rua</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite a rua"
                                style="border-color: black;"><br><br>

                            <label class="form-label">Complemento</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite um complemento"
                                style="border-color: black;"><br><br>

                            <label class="form-label">Cidade</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite a cidade"
                                style="border-color: black;"><br><br>

                            <label class="form-label">Ramal</label>
                            <input type="text" class="form-control input-preto" placeholder="Digite seu ramal"
                                style="border-color: black;"><br><br>
                        </div>
                    </div>
                    <div class=" d-flex justify-content-center">
                        <button class="btn btn-primary px-5" style="border-color: black;">Cadastrar</button>
                    </div>
                    <div class=" d-flex justify-content-center">

                        <small style="font-size: 15px; text-align: center;">
                            Já tem conta? <a href="/public/login.html">Entrar</a>
                        </small><br>
                        </div>
                    <p id="resultado"></p>       
                </form>
            </div>
        </div>
</body>

</html>
